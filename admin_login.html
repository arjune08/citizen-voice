<!-- =============================================
     WardPulse AI - Admin Login Page
     ============================================= -->
{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}

{% block footer %}{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center py-20 px-4" style="background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);">
    <div class="w-full max-w-md">
        <div class="glass-card p-8" style="animation: scaleIn 0.4s ease;">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary-500 to-primary-700 flex items-center justify-center text-white text-2xl mx-auto mb-4">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h1 class="text-2xl font-bold mb-1" style="color: var(--text-primary);">Admin Portal</h1>
                <p class="text-sm" style="color: var(--text-secondary);">Authorized personnel only</p>
            </div>

            <!-- Admin Login Form -->
            <form method="POST" action="{{ url_for('auth.admin_login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label class="form-label"><i class="fas fa-envelope mr-2 text-primary-500"></i>Admin Email</label>
                    <input type="email" name="email" class="form-input" placeholder="admin@wardpulse.ai" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label"><i class="fas fa-lock mr-2 text-primary-500"></i>Password</label>
                    <div class="relative">
                        <input type="password" name="password" id="adminPassword" class="form-input pr-10" placeholder="••••••••" required>
                        <button type="button" onclick="togglePasswordVisibility('adminPassword', this)" class="absolute right-3 top-1/2 -translate-y-1/2" style="color: var(--text-muted);">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-full btn-lg mt-2">
                    <i class="fas fa-sign-in-alt"></i> Admin Sign In
                </button>
            </form>

            <!-- Back Link -->
            <p class="text-center text-sm mt-6" style="color: var(--text-muted);">
                <a href="{{ url_for('auth.login') }}" class="hover:text-primary-500 transition">
                    <i class="fas fa-arrow-left mr-1"></i>Back to Citizen Login
                </a>
            </p>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
