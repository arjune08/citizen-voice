<!-- =============================================
     WardPulse AI - Forgot Password Page
     ============================================= -->
{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block footer %}{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center py-20 px-4" style="background: var(--gradient-hero);">
    <div class="w-full max-w-md">
        <div class="glass-card p-8" style="animation: scaleIn 0.4s ease;">
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center text-white text-2xl mx-auto mb-4">
                    <i class="fas fa-key"></i>
                </div>
                <h1 class="text-2xl font-bold mb-1" style="color: var(--text-primary);">Forgot Password</h1>
                <p class="text-sm" style="color: var(--text-secondary);">Enter your email to receive reset instructions</p>
            </div>

            <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label class="form-label"><i class="fas fa-envelope mr-2 text-primary-500"></i>Email Address</label>
                    <input type="email" name="email" class="form-input" placeholder="your@email.com" required autofocus>
                </div>

                <button type="submit" class="btn btn-primary w-full btn-lg">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>

            <p class="text-center text-sm mt-6" style="color: var(--text-secondary);">
                Remember your password?
                <a href="{{ url_for('auth.login') }}" class="text-primary-500 font-semibold hover:text-primary-400 transition">Sign in</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}
