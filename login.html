<!-- =============================================
     WardPulse AI - User Login Page
     ============================================= -->
{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block footer %}{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center py-20 px-4" style="background: var(--gradient-hero);">
    <div class="w-full max-w-md">
        <!-- Glass Card -->
        <div class="glass-card p-8" style="animation: scaleIn 0.4s ease;">
            <!-- Header -->
            <div class="text-center mb-8">
                <a href="{{ url_for('main.landing') }}" class="nav-logo text-2xl inline-flex items-center gap-2 mb-4">
                    <i class="fas fa-city"></i>WardPulse AI
                </a>
                <h1 class="text-2xl font-bold mb-1" style="color: var(--text-primary);">Welcome Back</h1>
                <p class="text-sm" style="color: var(--text-secondary);">Sign in to your citizen account</p>
            </div>

            <!-- Login Form -->
            <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label class="form-label"><i class="fas fa-envelope mr-2 text-primary-500"></i>Email</label>
                    <input type="email" name="email" class="form-input" placeholder="your@email.com" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label"><i class="fas fa-lock mr-2 text-primary-500"></i>Password</label>
                    <div class="relative">
                        <input type="password" name="password" id="loginPassword" class="form-input pr-10" placeholder="••••••••" required>
                        <button type="button" onclick="togglePasswordVisibility('loginPassword', this)" class="absolute right-3 top-1/2 -translate-y-1/2" style="color: var(--text-muted);">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between mb-6">
                    <label class="flex items-center gap-2 text-sm cursor-pointer" style="color: var(--text-secondary);">
                        <input type="checkbox" name="remember" class="rounded border-gray-300 text-primary-500 focus:ring-primary-500">
                        Remember me
                    </label>
                    <a href="{{ url_for('auth.forgot_password') }}" class="text-sm text-primary-500 hover:text-primary-400 transition">
                        Forgot password?
                    </a>
                </div>

                <button type="submit" class="btn btn-primary w-full btn-lg">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center gap-4 my-6">
                <hr class="flex-1" style="border-color: var(--border-color);">
                <span class="text-xs font-medium" style="color: var(--text-muted);">OR</span>
                <hr class="flex-1" style="border-color: var(--border-color);">
            </div>

            <!-- Register Link -->
            <p class="text-center text-sm" style="color: var(--text-secondary);">
                Don't have an account?
                <a href="{{ url_for('auth.register') }}" class="text-primary-500 font-semibold hover:text-primary-400 transition">
                    Register here
                </a>
            </p>

            <!-- Admin Link -->
            <p class="text-center text-xs mt-4" style="color: var(--text-muted);">
                <a href="{{ url_for('auth.admin_login') }}" class="hover:text-primary-500 transition">
                    <i class="fas fa-shield-halved mr-1"></i>Admin Login
                </a>
            </p>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
